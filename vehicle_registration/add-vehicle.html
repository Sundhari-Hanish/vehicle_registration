<!DOCTYPE html>
<html>
<head>
<title>Add a Vehicle</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>
<div id="container">

<header>
<h1>Add a Vehicle </h1>
<button id="reset">Reset</button>

<ul class="nav">
<li><a href="index.html">Home</a></li>
<li><a href="people.html">People search</a></li>
<li><a href="vehicle.html">Vehicle search</a></li>
<li><a href="add-vehicle.html">Add a vehicle</a></li>
</ul>
</header>

<main>

<label for="rego">Rego:</label>
<input id="rego">

<label for="make">Make:</label>
<input id="make">

<label for="model">Model:</label>
<input id="model">

<label for="colour">Colour:</label>
<input id="colour">

<label for="owner">Owner:</label>
<input type="text" id="owner" placeholder="Search for owner...">

<button id="checkOwner" disabled>Check owner</button>

<div id="owner-results"></div>

<button id="newOwnerBtn" disabled>New owner</button>

<div id="newOwnerForm" style="display:none;">
<label>Name:</label><input id="name">
<label>Address:</label><input id="address">
<!-- <label>DOB:</label><input id="dob"> -->
<label>License:</label><input id="license">
<!-- <label>Expire:</label><input id="expire"> -->
<label>DOB:</label><input id="dob" type="date">
<label>Expire:</label><input id="expire" type="date">

<button id="addOwner">Add owner</button>
<div id="message-owner"></div>
</div>

<button id="addVehicle">Add vehicle</button>
<div id="message-vehicle"></div>

</main>

<aside>
<img src="images/vehicle.png" alt="Vehicle illustration">
</aside>

<!-- <footer>
<p>Footer</p>
</footer> -->
<footer>
    <p>Vehicle Management System © 2026</p>
</footer>

</div>

<script type="module" src="js/addVehicle.js"></script>
<script src="js/common.js"></script>
</body>
</html>
